send_anonymous_usage_stats: false
requires_meltano: '>=4.0'
project_id: tap-fedidb
default_environment: dev
environments:
- name: dev
plugins:
  extractors:
  - name: tap-fedidb
    namespace: fedidb
    label: FediDB
    docs: https://github.com/reservoir-data/tap-fedidb#readme
    repo: https://github.com/reservoir-data/tap-fedidb
    pip_url: -e .
    description: Fediverse Network Statistics
    capabilities:
    - state
    - catalog
    - discover
    - about
    - stream-maps
    - schema-flattening
    - batch
    - structured-logging
    settings: []
  loaders:
  - name: target-jsonl
    variant: andyh1203
    pip_url: target-jsonl
