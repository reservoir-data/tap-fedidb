name: Test tap-fedidb

on:
  push:
    branches: [main]
    paths:
      - tap_fedidb/**
      - tests/**
      - pyproject.toml
      - uv.lock
      - .github/workflows/test.yml
  pull_request:
    paths:
      - tap_fedidb/**
      - tests/**
      - pyproject.toml
      - uv.lock
      - .github/workflows/test.yml
  workflow_dispatch:
  schedule:
  # Run weekly on Monday at 12:00 PM UTC
  - cron: "0 12 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_COLOR: "1"
  # renovate: datasource=pypi depName=uv
  UV_VERSION: 0.11.17
  # renovate: datasource=pypi depName=tox
  TOX_VERSION: 4.55.0
  # renovate: datasource=pypi depName=tox-uv
  TOX_UV_VERSION: 1.35.2

jobs:
  build-package:
    name: Build & verify package
    runs-on: ubuntu-latest
    outputs:
      supported-python-versions: ${{ steps.baipp.outputs.supported_python_classifiers_json_array }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: hynek/build-and-inspect-python-package@d44ca7d91762de7a7d5436ddae667c6da6d1c3df # v2.18.0
        id: baipp

  test:
    name: Test
    runs-on: ubuntu-24.04
    needs: build-package
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        python-version: ${{ fromJson(needs.build-package.outputs.supported-python-versions) }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        python-version: ${{ matrix.python-version }}
        version: ${{ env.UV_VERSION }}
    - name: Run tests
      run: >
        uvx
        --with tox-uv==${TOX_UV_VERSION}
        --with tox==${TOX_VERSION}
        tox -e ${MATRIX_PYTHON_VERSION}
      env:
        MATRIX_PYTHON_VERSION: ${{ matrix.python-version }}

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        version: ${{ env.UV_VERSION }}
    - run: >
        uv tool install
        --managed-python
        --with tox-uv==${TOX_UV_VERSION}
        --from tox==${TOX_VERSION}
        tox
    - name: Static type checking
      run: tox -e typing
    - name: Unused, missing and transitive dependencies
      run: tox -e dependencies
